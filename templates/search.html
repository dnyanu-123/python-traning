{% extends "base.html" %}

{% block title %}Search{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-4">Search Travellers</h2>

    <form method="POST" class="mb-3">

        <input type="text"
               name="query"
               class="form-control"
               placeholder="Search by name or destination"
               required>

        <button class="btn btn-primary mt-2">
            Search
        </button>

    </form>

    <table class="table table-bordered">

        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Destination</th>
                <th>Created By</th>
            </tr>
        </thead>

        <tbody>

            {% for t in results %}
            <tr>
                <td>{{ t['name'] }}</td>
                <td>{{ t['age'] }}</td>
                <td>{{ t['email'] }}</td>
                <td>{{ t['destination'] }}</td>
                <td>{{ t['username'] }}</td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
