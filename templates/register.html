{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | AI Trip Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
    margin:1;
    padding:1;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

   background :url (" https://www.magnific.com/free-photos-vectors/registration-background ");

}

.overlay{

    position:absolute;
    width:100%;
    height:100%;
    background:rgba(152, 111, 111, 0.35);

}

.register-box{

    position:relative;

    width:420px;

    padding:40px;

    background:rgba(89, 128, 102, 0.15);

    backdrop-filter:blur(15px);

    border-radius:20px;

    box-shadow:0 8px 32px rgba(0,0,0,.3);

    color:white;

    z-index:10;
}

.register-box h2{

    text-align:center;

    margin-bottom:30px;

    font-weight:bold;
}

.input-group{

    margin-bottom:18px;
}

.input-group-text{

    background:rgba(255,255,255,.20);

    border:none;

    color:white;
}

.form-control{

    background:rgba(255,255,255,.20);

    border:none;

    color:white;
}

.form-control::placeholder{

    color:#eee;
}

.form-control:focus{

    background:rgba(255,255,255,.25);

    color:white;

    box-shadow:none;
}

.btn-register{

    width:100%;

    border-radius:30px;

    padding:12px;

    font-size:18px;

    font-weight:bold;

    transition:.3s;
}

.btn-register:hover{

    transform:translateY(-3px);

    box-shadow:0 5px 15px rgba(0,123,255,.4);
}

.bottom{

    text-align:center;

    margin-top:20px;
}

.bottom a{

    color:white;

    text-decoration:none;

    font-weight:bold;
}

.bottom a:hover{

    text-decoration:underline;
}

.logo{

    text-align:center;

    font-size:50px;

    margin-bottom:10px;

    color:#FFD43B;
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="register-box">

<div class="logo">
<i class="fa-solid fa-earth-americas"></i>
</div>

<h2>Create Account</h2>

<form action="/register" method="POST">

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-envelope"></i>
</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Email Address"
required>

</div>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input
type="password"
name="confirm_password"
class="form-control"
placeholder="Confirm Password"
required>

</div>

<button class="btn btn-primary btn-register">
<i class="fa-solid fa-user-plus"></i>
 Register
</button>

<div class="bottom">

<p class="mt-3">
Already have an account?
<a href="/login">Login</a>
</p>

</div>

</form>

</div>

</body>
</html>
{% endblock %}
background:url("{{ url_for('static', filename='images/register_bg.jpg') }}") center center/cover no-repeat;
