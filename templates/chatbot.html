{% extends "base.html" %}

{% block title %}AI Travel Chatbot{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h3>🤖 AI Travel Assistant</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <textarea
                    name="message"
                    class="form-control"
                    rows="4"
                    placeholder="Ask your travel question..."
                    required
                ></textarea>

                <button class="btn btn-primary mt-3">
                    Ask AI
                </button>

            </form>

            {% if response %}
            <hr>

            <h5>AI Response:</h5>

            <div class="alert alert-success">
                <pre>{{ response }}</pre>
            </div>

            {% endif %}

        </div>

    </div>

</div>

{% endblock %}
