<h2>Edit Traveller</h2>

<form method="POST">
    <input type="text" name="name" value="{{ traveller[1] }}" required><br><br>

    <input type="number" name="age" value="{{ traveller[2] }}" required><br><br>

    <input type="email" name="email" value="{{ traveller[3] }}" required><br><br>

    <input type="text" name="contact_no" value="{{ traveller[4] }}" required><br><br>

    <input type="text" name="destination" value="{{ traveller[5] }}" required><br><br>

    <input type="number" name="days" value="{{ traveller[6] }}" required><br><br>

    <input type="number" name="budget" value="{{ traveller[7] }}" required><br><br>

    <button type="submit">Update</button>
</form>
