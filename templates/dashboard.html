{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-4">
        Dashboard
    </h2>

    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border-primary">
                <div class="card-body">
                    <h5>Total Users</h5>
                    <h2>{{ total_users }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border-success">
                <div class="card-body">
                    <h5>Total Travellers</h5>
                    <h2>{{ total_travellers }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border-warning">
                <div class="card-body">
                    <h5>Total Trips</h5>
                    <h2>{{ total_trips }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow text-center border-danger">
                <div class="card-body">
                    <h5>Total Budget</h5>
                    <h2>₹ {{ total_budget }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
